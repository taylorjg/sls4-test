service: sls4-test

provider:
  name: aws
  profile: taylorjg
  runtime: nodejs24.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    TFGM_API_URL: https://apiary.tfgm.com
  httpApi:
    cors: true

build:
  esbuild:
    bundle: true
    minify: true
    sourcemap: true

functions:
  getTransportModes:
    handler: src/get-transport-modes.handler
    memorySize: 256
    timeout: 10
    events:
      - httpApi:
          path: /transport-modes
          method: get
