service: sls4-test

provider:
  name: aws
  profile: taylorjg
  runtime: nodejs22.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  environment:
    TFGM_API_URL: https://apiary.tfgm.com

functions:
  hello:
    handler: src/handler.hello
    events:
      - http:
          path: /hello
          method: get
